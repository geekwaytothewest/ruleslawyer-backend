name: Run Unit Tests before Merge

on:
  pull_request:
  merge_group:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: NPM Install
        run: npm ci

      - name: Unit Test
        run: npm run test
